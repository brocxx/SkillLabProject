<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Inventory System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container container-small">
        <header>
            <h1>Inventory Portal</h1>
            <nav class="nav-links">
                <a href="index.html" class="active">Add Product</a>
                <a href="inventory.php">View Inventory</a>
                <a href="admin-login.php">Admin Login</a>
            </nav>
        </header>

        <h2>Product Entry Form</h2>

        <!-- Action points to submit_product.php, sending data via POST -->
        <form action="submit_product.php" method="POST">
            <div class="form-group">
                <label for="name">Product Name *</label>
                <input type="text" id="name" name="name" required placeholder="e.g., Wireless Mouse">
            </div>

            <div class="form-group">
                <label for="category">Category *</label>
                <input type="text" id="category" name="category" required placeholder="e.g., Electronics" list="category-suggestions">
                <!-- A clean suggestion datalist for better user experience -->
                <datalist id="category-suggestions">
                    <option value="Electronics">
                    <option value="Office Supplies">
                    <option value="Furniture">
                    <option value="Apparel">
                    <option value="Groceries">
                </datalist>
            </div>

            <div class="form-group">
                <label for="quantity">Quantity *</label>
                <input type="number" id="quantity" name="quantity" min="0" required placeholder="e.g., 50">
            </div>

            <div class="form-group">
                <label for="price">Unit Price ($) *</label>
                <input type="number" id="price" name="price" min="0.00" step="0.01" required placeholder="e.g., 29.99">
            </div>

            <div class="form-group">
                <label for="description">Product Description</label>
                <textarea id="description" name="description" placeholder="Briefly describe the product specs, warranty, or other details..."></textarea>
            </div>

            <div class="form-group" style="margin-top: 30px;">
                <button type="submit" class="btn btn-primary" style="width: 100%;">Submit Product</button>
            </div>
        </form>
    </div>
</body>
</html>
